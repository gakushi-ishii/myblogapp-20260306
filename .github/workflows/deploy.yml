name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Deploy to Container Apps
        run: |
          az extension add --name containerapp --upgrade --allow-preview true
          az containerapp up \
            --name myblogapp \
            --resource-group rg-myblogapp \
            --environment myblogapp-env \
            --source . \
            --ingress external \
            --target-port 8080

